<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support & Donasi - YouTube Detector</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h2 {
            color: #333;
            margin-top: 0;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 25px;
            font-size: 0.95em;
        }
        .qris-container {
            border: 2px dashed #ddd;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            background-color: #fafafa;
        }
        .qris-container img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            display: block; /* Menghilangkan spasi aneh di bawah gambar */
            margin: 0 auto;
        }
        .wallets {
            font-size: 0.9em;
            color: #888;
        }
        .wallets strong {
            color: #555;
            display: block;
            margin-bottom: 5px;
        }
        .footer-text {
            margin-top: 30px;
            font-size: 0.8em;
            color: #bbb;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Traktir Saya Kopi ☕</h2>
    <p>Jika <b>YouTube Detector</b> membantu mempercepat riset konten Anda, Anda bisa mendukung pengembangannya dengan memindai kode QRIS di bawah ini.</p>
    
    <div class="qris-container">
        <img src="QR.png" alt="Scan QRIS untuk Donasi">
    </div>

    <div class="wallets">
        <strong>Menerima pembayaran dari:</strong>
        Gopay • OVO • DANA • ShopeePay • BCA • Mandiri • Semua e-Wallet
    </div>

    <div class="footer-text">
        © 2026 YouTube Detector Tools
    </div>
</div>

</body>
</html>
